<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kibon - Resgate seu Bônus de Freezer</title>
    <style>
        :root {
            --vermelho-kibon: #e31b23;
            --amarelo-kibon: #ffcc00;
            --cinza-fundo: #f4f4f4;
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; background-color: var(--cinza-fundo); 
        }

        header {
            background-color: white;
            padding: 20px 0;
            text-align: center;
            border-bottom: 5px solid var(--vermelho-kibon);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo-kibon {
            font-weight: 900;
            font-size: 2.8em;
            color: var(--vermelho-kibon);
            font-style: italic;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .container { 
            max-width: 450px; 
            margin: 40px auto; 
            background: #fff; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .bonus-card { 
            background: var(--vermelho-kibon); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            border-radius: 20px; 
            margin-bottom: 30px;
        }

        .bonus-card h2 { margin: 0; font-size: 1.5em; text-transform: uppercase; }
        .bonus-card p { margin: 5px 0 0; font-weight: bold; color: var(--amarelo-kibon); }

        .form-group { margin-bottom: 18px; }
        
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 6px;
            color: #444;
            font-size: 0.9em;
        }

        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #f0f0f0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
            outline: none;
        }

        input:focus, select:focus { border-color: var(--vermelho-kibon); }

        .error-msg { 
            color: var(--vermelho-kibon); 
            font-size: 0.8em; 
            font-weight: bold;
            display: none; 
            margin-top: 5px;
        }

        .btn-download { 
            display: block; 
            width: 100%; 
            background: var(--vermelho-kibon); 
            color: white; 
            text-align: center; 
            padding: 20px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 1.2em;
            margin-top: 25px; 
            box-shadow: 0 6px 20px rgba(227, 27, 35, 0.4);
        }

        footer { text-align: center; padding: 30px; font-size: 0.75em; color: #bbb; }
    </style>
</head>
<body>

<header>
    <div class="logo-kibon">Kibon</div>
</header>

<div class="container">
    <div class="bonus-card">
        <h2>Bônus de R$ 500,00</h2>
        <p>EXCLUSIVO PARA PARCEIROS ANDROID</p>
    </div>

    <form id="cadastroForm">
        <div class="form-group">
            <label>PERFIL PROFISSIONAL</label>
            <select required>
                <option value="">Selecione seu perfil...</option>
                <option>Ponto de Venda (PDV)</option>
                <option>Revendedor Autônomo</option>
                <option>Distribuição</option>
            </select>
        </div>

        <div class="form-group">
            <label>CPF OU CNPJ (APENAS NÚMEROS)</label>
            <input type="text" id="documento" placeholder="Validação obrigatória" required>
            <span id="docErro" class="error-msg">⚠️ Documento inválido. Digite um CPF/CNPJ real.</span>
        </div>

        <!-- ESTADOS E CIDADES DINÂMICOS -->
        <div class="form-group">
            <label>ESTADO (UF)</label>
            <select id="estado" required>
                <option value="">Selecione o Estado...</option>
            </select>
        </div>

        <div class="form-group">
            <label>CIDADE</label>
            <select id="cidade" required disabled>
                <option value="">Selecione o Estado primeiro...</option>
            </select>
        </div>

        <div class="form-group">
            <label>MODELO DO SEU ANDROID</label>
            <select required>
                <option value="">Selecione o aparelho...</option>
                <optgroup label="SAMSUNG">
                    <option>Galaxy S24 / S23 / S22 / S21 / S20</option>
                    <option>Galaxy A10 ao A70</option>
                    <option>Galaxy M / Note / Z Flip / Z Fold</option>
                </optgroup>
                <optgroup label="MOTOROLA">
                    <option>Moto G (Todos os modelos)</option>
                    <option>Moto Edge / Moto E</option>
                </optgroup>
                <optgroup label="OUTROS">
                    <option>Xiaomi (Redmi / POCO)</option>
                    <option>Realme / Asus / Infinix</option>
                </optgroup>
            </select>
        </div>

        <a href="https://github.com/wellsilvasp13-hash/kibon/raw/main/kibon.apk" class="btn-download" id="btnFinal">
            BAIXAR APK E RESGATAR R$ 500
        </a>
    </form>
</div>

<footer>&copy; 2026 Kibon Brasil - Unilever.</footer>

<script>
    // 1. CARREGAR TODOS OS ESTADOS DO BRASIL
    const selectEstado = document.getElementById('estado');
    const selectCidade = document.getElementById('cidade');

    fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome')
        .then(res => res.json())
        .then(estados => {
            estados.forEach(uf => {
                const opt = document.createElement('option');
                opt.value = uf.sigla;
                opt.innerHTML = uf.nome;
                selectEstado.appendChild(opt);
            });
        });

    // 2. CARREGAR CIDADES AO SELECIONAR ESTADO
    selectEstado.addEventListener('change', function() {
        const uf = this.value;
        selectCidade.innerHTML = '<option value="">Carregando cidades...</option>';
        selectCidade.disabled = true;

        if(uf) {
            fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios?orderBy=nome`)
                .then(res => res.json())
                .then(cidades => {
                    selectCidade.innerHTML = '<option value="">Selecione a Cidade...</option>';
                    cidades.forEach(cidade => {
                        const opt = document.createElement('option');
                        opt.value = cidade.nome;
                        opt.innerHTML = cidade.nome;
                        selectCidade.appendChild(opt);
                    });
                    selectCidade.disabled = false;
                });
        }
    });

    // 3. VALIDAÇÃO DE CPF/CNPJ
    document.getElementById('documento').addEventListener('blur', function() {
        const val = this.value.replace(/\D/g, '');
        const erro = document.getElementById('docErro');
        // Validação de comprimento básica (CPF 11 ou CNPJ 14)
        if (val.length !== 11 && val.length !== 14) {
            erro.style.display = 'block';
            this.style.borderColor = 'var(--vermelho-kibon)';
        } else {
            erro.style.display = 'none';
            this.style.borderColor = '#f0f0f0';
        }
    });
</script>

</body>
</html>
