<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Faturamento Kibon</title>
    <style>
        :root {
            --kibon-red: #e30613;
            --kibon-blue: #0056a0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            border-bottom: 3px solid var(--kibon-red);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .logo-kibon {
            width: 150px;
            height: auto;
        }

        .grid-filtros {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        input:focus {
            border-color: var(--kibon-blue);
        }

        /* Validação de Erro */
        .error-input {
            border: 2px solid var(--kibon-red) !important;
            background-color: #fff0f0;
        }

        .error-message {
            color: var(--kibon-red);
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .btn-buscar {
            width: 100%;
            background-color: var(--kibon-red);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-buscar:hover {
            background-color: #b3050f;
        }

        .resultados {
            margin-top: 30px;
            padding: 15px;
            border-left: 5px solid var(--kibon-blue);
            background: #eef6ff;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <!-- Substitua pelo link real da imagem da Kibon -->
        <img src="https://upload.wikimedia.org/wikipedia/pt/d/d2/Logo_Kibon.png" alt="Logo Kibon" class="logo-kibon">
        <h2>Consulta de Faturamento Comércio</h2>
    </div>

    <div class="grid-filtros">
        <!-- Seleção de Dispositivo -->
        <div class="input-group">
            <label>Modelo do Celular/Dispositivo:</label>
            <select id="modeloCelular">
                <option value="">Selecione o modelo...</option>
                <option value="iphone">iPhone (Todos)</option>
                <option value="samsung">Samsung Galaxy (Todos)</option>
                <option value="motorola">Motorola Moto (Todos)</option>
                <option value="xiaomi">Xiaomi (Todos)</option>
                <option value="tablet">Tablet / POS</option>
            </select>
        </div>

        <!-- Localização -->
        <div class="input-group">
            <label>Estado (UF):</label>
            <input type="text" id="estado" placeholder="Ex: SP, RJ, MG...">
        </div>

        <div class="input-group">
            <label>Cidade:</label>
            <input type="text" id="cidade" placeholder="Digite a cidade">
        </div>

        <!-- Documento com Validação -->
        <div class="input-group">
            <label>CNPJ ou CPF:</label>
            <input type="text" id="documento" placeholder="00.000.000/0000-00" oninput="validarDocumento()">
            <span id="msgErro" class="error-message">Documento inválido. Verifique os números.</span>
        </div>
    </div>

    <button class="btn-buscar" onclick="buscarFaturamento()">PESQUISAR FATURAMENTO</button>

    <div id="resultadoArea" class="resultados" style="display: none;">
        <strong>Resultado da Busca:</strong>
        <p id="feedbackTxt"></p>
    </div>
</div>

<script>
    function validarDocumento() {
        const docInput = document.getElementById('documento');
        const msgErro = document.getElementById('msgErro');
        const valor = docInput.value.replace(/\D/g, ''); // Remove letras e pontos

        // Lógica simples: CPF tem 11 e CNPJ 14. Se fugir disso ao digitar, avisa.
        if (valor.length > 0 && valor.length !== 11 && valor.length !== 14) {
            docInput.classList.add('error-input');
            msgErro.style.display = 'block';
        } else {
            docInput.classList.remove('error-input');
            msgErro.style.display = 'none';
        }
    }

    function buscarFaturamento() {
        const doc = document.getElementById('documento').value;
        const cidade = document.getElementById('cidade').value;
        const resultadoArea = document.getElementById('resultadoArea');
        const feedbackTxt = document.getElementById('feedbackTxt');

        if (!doc || document.getElementById('documento').classList.contains('error-input')) {
            alert("Por favor, insira um CPF ou CNPJ válido antes de buscar.");
            return;
        }

        // Simulação de busca
        resultadoArea.style.display = 'block';
        feedbackTxt.innerHTML = `Buscando registros para o documento <b>${doc}</b> na cidade de <b>${cidade}</b>... <br>Aguarde o processamento dos dados de faturamento.`;
    }
</script>

</body>
</html>
