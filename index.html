<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Parceiro Kibon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-brand { background: linear-gradient(135deg, #E30613 0%, #ff4d4d 100%); }
        .input-error { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">

    <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        
        <div class="gradient-brand p-8 text-white text-center">
            <div class="bg-white inline-block px-4 py-2 rounded-full mb-4">
                <span class="text-red-600 font-bold text-sm tracking-widest uppercase italic">Kibon</span>
            </div>
            <h1 class="text-3xl font-extrabold mb-2">Seja um Parceiro Oficial</h1>
            <p class="text-red-100 opacity-90">Receba seu bônus e freezer comodato</p>
        </div>

        <form id="formCadastro" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Nome Completo</label>
                    <input type="text" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Nome do Comércio</label>
                    <input type="text" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">CNPJ ou CPF</label>
                    <input type="text" id="documento" placeholder="000.000.000-00" required 
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                    <p id="error-msg" class="hidden text-red-500 text-xs font-semibold ml-1 mt-1">Documento inválido. Verifique os números.</p>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Renda Mensal Estimada</label>
                    <input type="text" placeholder="R$ 0,00" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Modelo do Aparelho</label>
                    <select required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                        <option value="" selected disabled>Selecione...</option>
                        <option>Vertical</option>
                        <option>Horizontal</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Estado</label>
                    <input type="text" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Região</label>
                    <input type="text" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                </div>
            </div>

            <div class="bg-red-50 rounded-2xl p-6 border border-red-100">
                <h3 class="text-red-700 font-bold text-lg mb-2 italic text-center">🎁 BÔNUS DE R$ 500,00 + FREEZER COMODATO</h3>
                <p class="text-center text-red-600 text-sm">Baixe o app após o cadastro para validar seu benefício!</p>
            </div>

            <button type="submit" class="w-full gradient-brand text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">
                FINALIZAR E RESGATAR
            </button>
            
            <a href="https://wa.me/5500999999999" class="w-full flex items-center justify-center gap-2 border-2 border-green-500 text-green-600 font-bold py-3 rounded-xl hover:bg-green-50 transition-colors">
                FALAR COM SUPORTE NO WHATSAPP
            </a>
        </form>
    </div>

    <script>
        const inputDoc = document.getElementById('documento');
        const errorMsg = document.getElementById('error-msg');

        // Função para validar CPF/CNPJ
        function validarDocumento(val) {
            val = val.replace(/[^\d]+/g, '');
            if (val.length === 11) return validarCPF(val);
            if (val.length === 14) return validarCNPJ(val);
            return false;
        }

        function validarCPF(cpf) {
            if (/^(\d)\1+$/.test(cpf)) return false;
            let soma = 0, resto;
            for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i-1, i)) * (11 - i);
            resto = (soma * 10) % 11;
            if ((resto == 10) || (resto == 11)) resto = 0;
            if (resto != parseInt(cpf.substring(9, 10))) return false;
            soma = 0;
            for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i-1, i)) * (12 - i);
            resto = (soma * 10) % 11;
            if ((resto == 10) || (resto == 11)) resto = 0;
            return resto == parseInt(cpf.substring(10, 11));
        }

        function validarCNPJ(cnpj) {
            if (/^(\d)\1+$/.test(cnpj)) return false;
            let tamanho = cnpj.length - 2;
            let numeros = cnpj.substring(0, tamanho);
            let digitos = cnpj.substring(tamanho);
            let soma = 0, pos = tamanho - 7;
            for (let i = tamanho; i >= 1; i--) {
                soma += numeros.charAt(tamanho - i) * pos--;
                if (pos < 2) pos = 9;
            }
            let resultado = soma % 11 < 2 ? 0 : 11 - (soma % 11);
            if (resultado != digitos.charAt(0)) return false;
            tamanho = tamanho + 1;
            numeros = cnpj.substring(0, tamanho);
            soma = 0;
            pos = tamanho - 7;
            for (let i = tamanho; i >= 1; i--) {
                soma += numeros.charAt(tamanho - i) * pos--;
                if (pos < 2) pos = 9;
            }
            resultado = soma % 11 < 2 ? 0 : 11 - (soma % 11);
            return resultado == digitos.charAt(1);
        }

        inputDoc.addEventListener('blur', function() {
            if (this.value && !validarDocumento(this.value)) {
                this.classList.add('input-error');
                errorMsg.classList.remove('hidden');
            } else {
                this.classList.remove('input-error');
                errorMsg.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
