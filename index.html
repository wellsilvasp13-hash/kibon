<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Parceiro Kibon - Resgate de Bônus</title>
    <style>
        :root {
            --vermelho-kibon: #e31b23;
            --amarelo-kibon: #ffcc00;
            --azul-banco: #0056b3;
            --branco: #ffffff;
            --fundo: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--fundo);
            color: #333;
        }

        /* Topo com Imagem Chamativa */
        .hero-banner {
            background: linear-gradient(rgba(227, 27, 35, 0.8), rgba(227, 27, 35, 0.8)),

            background-size: cover;
            background-position: center;
            height: 220px;

            color: white;
            text-align: center;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .hero-banner h1 { font-size: 35px; font-style: italic; margin: 0; text-transform: uppercase; }
        .hero-banner p { font-size: 16px; font-weight: bold; color: var(--amarelo-kibon); }

        .container {
            max-width: 450px;
            margin: -50px auto 30px;
            padding: 0 15px;
        }

        .card {
            background: var(--branco);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
