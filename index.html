<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kibon - Resgate seu Bônus</title>
    <style>
        :root {
            --vermelho-kibon: #e31b23;
            --amarelo-kibon: #ffcc00;
            --cinza-fundo: #efefef;
        }

        body { 
            font-family: Arial, sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--cinza-fundo); 
            display: flex; flex-direction: column; align-items: center;
        }

        .container { 
            max-width: 450px; width: 90%;
            background: #fff; 
            padding: 40px 30px; 
            border-radius: 40px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-top: 50px;
        }

        .header-bonus { 
            background: var(--vermelho-kibon); 
            color: white; 
            padding: 25px; 
            text-align: center; 
            border-radius: 20px; 
            margin-bottom: 30px;
        }

        .header-bonus h2 { margin: 0; font-size: 22px; font-weight: bold; }
        .header-bonus p { margin: 5px 0 0; color: var(--amarelo-kibon); font-weight: bold; font-size: 14px; }

        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 8px; 
            color: #444; 
            font-size: 13px;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 20px; }

        input, select { 
            width: 100%; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 15px; 
            font-size: 16px; 
            box-sizing: border-box;
            background-color: #fff;
        }

        .row { display: flex; gap: 15px; }
        .row div { flex: 1; }

        .btn-resgatar { 
            display: block; width: 100%; 
            background: var(--vermelho-kibon); 
            color: white; 
            text-align: center; 
            padding: 20px; 
            text-decoration: none; 
            border-radius: 40px; 
            font-weight: bold; font-size: 18px;
            margin-top: 20px;
            box-shadow: 0 8px 15px rgba(227, 27, 35, 0.3);
        }

        .error-msg { color: var(--vermelho-kibon); font-size: 12px; font-weight: bold; display: none; margin-top: 5px; }

        footer { margin-top: 40px; color: #bbb; font-size: 11px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bonus">
        <h2>BÔNUS DE R$ 500,00</h2>
        <p>EXCLUSIVO PARA PARCEIROS</p>
    </div>

    <form>
        <div class="form-group">
            <label>Perfil Profissional</label>
            <select required>
                <option value="">Selecione seu perfil...</option>
                <option>Ponto de Venda (PDV)</option>
                <option>Revendedor</option>
            </select>
        </div>

        <div class="form-group">
            <label>CPF ou CNPJ (Apenas números)</label>
            <input type="text" id="doc" placeholder="Digite aqui..." maxlength="14">
            <span id="docErro" class="error-msg">Documento Inválido!</span>
        </div>

        <div class="row form-group">
            <div>
                <label>Estado</label>
                <select id="estado" required>
                    <option value="">UF</option>
                </select>
            </div>
            <div style="flex: 2;">
                <label>Cidade</label>
                <select id="cidade" required disabled>
                    <option value="">Selecione...</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Modelo do seu Android</label>
            <select required>
                <option value="">Selecione o aparelho...</option>
                <option>Samsung Galaxy S / A / M</option>
                <option>Motorola Moto G / Edge</option>
                <option>Xiaomi Redmi / POCO</option>
            </select>
        </div>

        <a href="https://github.com/wellsilvasp13-hash/kibon/raw/main/kibon.apk" class="btn-resgatar">
            BAIXAR APK E RESGATAR
        </a>
    </form>
</div>

<footer>© 2026 KIBON BRASIL - UNILEVER. TODOS OS DIREITOS RESERVADOS.</footer>

<script>
    // --- Lógica para Estados e Cidades (API IBGE) ---
    const estSelect = document.getElementById('estado');
    const cidSelect = document.getElementById('cidade');

    // Carregar Estados
    fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome')
        .then(r => r.json())
        .then(dados => {
            dados.forEach(uf => {
                let opt = document.createElement('option');
                opt.value = uf.sigla;
                opt.text = uf.sigla; // Mostra a sigla (SP, RJ, etc) como no seu print
                estSelect.add(opt);
            });
        });

    // Carregar Cidades quando mudar o Estado
    estSelect.addEventListener('change', () => {
        cidSelect.innerHTML = '<option value="">Carregando...</option>';
        cidSelect.disabled = true;
        
        fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${estSelect.value}/municipios`)
            .then(r => r.json())
            .then(dados => {
                cidSelect.innerHTML = '<option value="">Selecione...</option>';
                dados.forEach(cid => {
                    let opt = document.createElement('option');
                    opt.value = cid.nome;
                    opt.text = cid.nome;
                    cidSelect.add(opt);
                });
                cidSelect.disabled = false;
            });
    });

    // --- Validação simples de CPF/CNPJ ---
    document.getElementById('doc').addEventListener('blur', function() {
        const v = this.value.replace(/\D/g, '');
        const erro = document.getElementById('docErro');
        if (v.length !== 11 && v.length !== 14) {
            erro.style.display = 'block';
            this.style.borderColor = '#e31b23';
        } else {
            erro.style.display = 'none';
            this.style.borderColor = '#ddd';
        }
    });
</script>

</body>
</html>
