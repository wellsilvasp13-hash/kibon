<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Resgate seu Bônus - Cadastro Profissional</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: auto; padding: 20px; background-color: #f4f4f4; }
        .container { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .bonus-badge { background: #28a745; color: white; padding: 10px; text-align: center; border-radius: 5px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .error-msg { color: red; font-size: 0.9em; display: none; }
        .btn-download { display: block; width: 100%; background: #007bff; color: white; text-align: center; padding: 15px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="bonus-badge">
        <h2>🎁 BÔNUS DE R$ 500,00 DISPONÍVEL</h2>
        <p>Complete seu perfil profissional e baixe o APK para resgatar e escolher seu freezer.</p>
    </div>

    <form id="cadastroForm">
        <!-- Perfil Profissional -->
        <div class="form-group">
            <label>Perfil Profissional:</label>
            <select required>
                <option value="">Selecione sua ocupação...</option>
                <option value="varejo">Varejista / Dono de Mercado</option>
                <option value="restaurante">Restaurante / Bar</option>
                <option value="distribuidor">Distribuidor</option>
                <option value="outro">Outro</option>
            </select>
        </div>

        <!-- Validação de Documento -->
        <div class="form-group">
            <label>CPF ou CNPJ:</label>
            <input type="text" id="documento" placeholder="000.000.000-00 ou 00.000.000/0000-00" required>
            <span id="docErro" class="error-msg">Documento inválido. Por favor, verifique os dados.</span>
        </div>

        <!-- Localização -->
        <div class="form-group">
            <label>Estado (UF):</label>
            <select id="estado" required>
                <option value="">Selecione o Estado</option>
                <!-- Preencher via JS ou manualmente as siglas (SP, RJ, MG...) -->
            </select>
        </div>

        <div class="form-group">
            <label>Cidade:</label>
            <select id="cidade" required disabled>
                <option value="">Selecione a Cidade</option>
            </select>
        </div>

        <!-- Seleção de Modelo Android -->
        <div class="form-group">
            <label>Seu Modelo de Dispositivo Android:</label>
            <select required>
                <option value="">Selecione seu modelo...</option>
                <optgroup label="Samsung">
                    <option>Galaxy S24 Ultra / S23 / S22</option>
                    <option>Galaxy A54 / A34 / A14</option>
                    <option>Galaxy M54 / M34</option>
                </optgroup>
                <optgroup label="Motorola">
                    <option>Edge 40 / 30</option>
                    <option>Moto G84 / G54 / G23</option>
                </optgroup>
                <optgroup label="Xiaomi">
                    <option>Redmi Note 13 / 12</option>
                    <option>Xiaomi 13T / 12 / POCO F5</option>
                </optgroup>
            </select>
        </div>

        <p><small>* Após o download, você poderá selecionar o modelo de freezer desejado dentro do aplicativo.</small></p>

        <a href="URL_DO_SEU_APK_AQUI.apk" class="btn-download" id="downloadBtn">
            BAIXAR APK E RESGATAR R$ 500,00
        </a>
    </form>
</div>

<script>
    // Exemplo simplificado de lógica para validar se o campo não está vazio 
    // e simular a validação que você solicitou.
    document.getElementById('documento').addEventListener('blur', function() {
        const doc = this.value.replace(/\D/g, '');
        const erro = document.getElementById('docErro');
        
        // Validação básica de tamanho para CPF ou CNPJ
        if (doc.length !== 11 && doc.length !== 14) {
            erro.style.display = 'block';
            this.style.borderColor = 'red';
        } else {
            erro.style.display = 'none';
            this.style.borderColor = '#ccc';
        }
    });

    // Nota: Para carregar todos os estados e cidades, recomendo usar a API do IBGE:
    // https://servicodados.ibge.gov.br/api/v1/localidades/estados
</script>

</body>
</html>
