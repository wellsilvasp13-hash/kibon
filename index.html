<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parceiro Kibon - Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-kibon { background-color: #E30613; }
        .text-kibon { color: #E30613; }
        .border-kibon { border-color: #E30613; }
        .input-error { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
        .btn-gradient { background: linear-gradient(180deg, #E30613 0%, #b3050f 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="bg-kibon py-4 px-4 shadow-md text-center">
        <div class="bg-white inline-block px-6 py-1 rounded-full">
            <span class="text-kibon font-black italic text-xl tracking-tighter">Kibon</span>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-6 px-4 pb-12">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            
            <div class="p-6 text-center border-b border-gray-100">
                <h1 class="text-2xl font-extrabold text-gray-800">Cadastro de Parceiro</h1>
                <p class="text-gray-500 text-sm font-medium">Preencha os dados para liberar seu bônus de <span class="text-kibon font-bold">R$ 500,00</span></p>
            </div>

            <form id="formCadastro" class="p-6 space-y-5">
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Nome Completo</label>
                        <input type="text" required placeholder="Digite seu nome" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Nome do Comércio</label>
                        <input type="text" required placeholder="Nome da sua loja" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">CNPJ ou CPF</label>
                        <input type="text" id="documento" required placeholder="000.000.000-00" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all">
                        <p id="error-msg" class="hidden text-red-600 text-[10px] font-bold mt-1 uppercase">Documento Inválido!</p>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Modelo do Celular</label>
                        <select required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-red-500 outline-none bg-white">
                            <option value="" disabled selected>Selecione...</option>
                            <option>Samsung</option>
                            <option>Motorola</option>
                            <option>Xiaomi / Redmi</option>
                            <option>iPhone</option>
                            <option>LG / Outros</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Estado (UF)</label>
                            <select id="estado" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-red-500 outline-none bg-white text-sm">
                                <option value="" disabled selected>UF</option>
                                <option value="AC">AC</option><option value="AL">AL</option><option value="AP">AP</option><option value="AM">AM</option><option value="BA">BA</option><option value="CE">CE</option
