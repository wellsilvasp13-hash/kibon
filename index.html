<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parceiro Kibon - Cadastro e Bônus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-brand { background: linear-gradient(135deg, #E30613 0%, #ff4d4d 100%); }
        .input-error { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">

    <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        
        <div class="gradient-brand p-8 text-white text-center">
            <div class="bg-white inline-block px-4 py-2 rounded-full mb-4 shadow-sm">
                <span class="text-red-600 font-bold text-sm tracking-widest uppercase italic">Kibon</span>
            </div>
            <h1 class="text-3xl font-extrabold mb-2">Seja um Parceiro Oficial</h1>
            <p class="text-red-100 opacity-95 font-medium italic text-lg">Use seus R$ 500 no aplicativo e faça seu pedido agora!</p>
        </div>

        <form id="formCadastro" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Nome Completo</label>
                    <input type="text" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Nome do Comércio</label>
                    <input type="text" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">CNPJ ou CPF</label>
                    <input type="text" id="documento" placeholder="Validamos automaticamente" required 
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                    <p id="error-msg" class="hidden text-red-500 text-[10px] font-bold ml-1 mt-1 uppercase">Documento Inválido!</p>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Renda Mensal Estimada</label>
                    <input type="text" placeholder="R$ 0,00" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Aparelho</label>
                    <select required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 appearance-none transition-all">
                        <option value="" selected disabled>Escolha...</option>
                        <option>Vertical</option>
                        <option>Horizontal</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Estado</label>
                    <input type="text" placeholder="Ex: SP" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 uppercase transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Região</label>
                    <input type="text" placeholder="Sua Região" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none bg-gray-50 transition-all">
                </div>
            </div>

            <div class="bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl p-6 text-center">
                <h3 class="font-bold text-gray-700 mb-2 italic uppercase tracking-tight">🍦 Escolha seus sorvetes</h3>
                <p class="text-sm text-gray-500 mb-4 font-medium">Veja o catálogo, use seus R$ 500 de bônus no app e receba tudo em casa.</p>
                <a href="https://www.kibon.com.br/nossos-sorvetes.html" target="_blank" class="text-red-600 font-extrabold underline hover:text-red-800 transition-colors">
                    CLIQUE AQUI PARA VER OS SORVETES
                </a>
                <div class="mt-4 flex items-center justify-center gap-2 text-green-600 font-bold text-sm bg-green-50 py-2 rounded-lg border border-green-100">
                    <span>⚡ ENTREGA EM ATÉ 24 HORAS!</span>
                </div>
            </div>

            <div class="bg-red-50 rounded-3xl p-8 border border-red-100 text-center shadow-inner">
                <h3 class="text-red-700 font-bold text-lg mb-2">🎁 VALIDAR BÔNUS E FREEZER</h3>
                <p class="text-sm text-red-600 mb-
