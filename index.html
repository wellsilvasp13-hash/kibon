<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kibon - Portal do Parceiro</title>
    <style>
        :root {
            --vermelho-kibon: #e31b23;
            --amarelo-kibon: #ffcc00;
            --branco: #ffffff;
            --fundo: #f2f2f2;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--fundo);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Topo com o nome Kibon */
        header {
            width: 100%;
            background-color: var(--branco);
            padding: 20px 0;
            text-align: center;
            border-bottom: 5px solid var(--vermelho-kibon);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .logo-kibon {
            font-size: 42px;
            font-weight: 900;
            color: var(--vermelho-kibon);
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin: 0;
        }

        /* Banner com imagem de sorvete */
        .hero-image {
            width: 100%;
            height: 180px;
            background: url('https://images.unsplash.com/photo-1563805042-7684c849a135?auto=format&fit=crop&q=80&w=1000') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 420px;
            width: 90%;
            margin: -40px auto 40px;
        }

        .card {
            background: var(--branco);
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        /* Bancos */
        .bancos-header {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: #fff8f8;
            border-radius: 15px;
        }
        .bancos-header span { font-size: 11px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        .bancos-icons { font-weight: bold; font-size: 12px; color: var(--vermelho-kibon); }
