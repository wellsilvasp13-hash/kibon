<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parceiro Kibon - Resgate de Bônus</title>
    <style>
        :root { 
            --vermelho-kibon: #e31b23; 
            --amarelo-kibon: #ffcc00; 
            --branco: #ffffff;
            --gradiente: linear-gradient(180deg, #e31b23 0%, #f0f0f0 40%);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--gradiente); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px;
            min-height: 100vh;
        }

        /* Título Principal Fora do Card */
        .main-title {
            color: var(--branco);
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .main-title h1 { margin: 0; font-size: 28px; font-style: italic; text-transform: uppercase; letter-spacing: -1px; }
        .main-title p { margin: 5px 0; font-weight: bold; font-size: 14px; opacity: 0.9; }

        .card { 
            background: white; 
            width: 100%; 
            max-width: 420px; 
            border-radius: 40px; 
            padding: 35px 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            box-sizing: border-box; 
            position: relative;
        }

        /* Selo de Verificado */
        .verified-badge {
            position: absolute;
            top: -15px;
            right: 20px;
            background: #007bff;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-bonus { 
            background: var(--vermelho-kibon); 
            color: white; 
            text-align: center; 
            padding: 25px; 
            border-radius: 25px; 
            margin-bottom: 30px;
            border: 2px solid var(--amarelo-kibon);
        }
        .header-bonus h2 { margin: 0; font-size: 26px; letter-spacing: 1px; }
        .header-bonus p { margin: 8px 0 0; color: var(--amarelo-kibon); font-weight: 900; font-size: 16px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }

        label { display: block; font-weight: bold; margin-bottom: 6px; color: #555; font-size: 12px; text-transform: uppercase; padding-left: 5px;}
        .form-group { margin-bottom: 18px; }
        
        input, select { 
            width: 100%; 
            padding: 16px; 
            border: 2px solid #f2f2f2; 
            border-radius: 18px; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s;
            background-color: #fafafa;
        }
        input:focus, select:focus { border-color: var(--vermelho-kibon); background-color: #fff; }

        .row { display: flex; gap: 12px; }
        .row div { flex: 1; }

        .btn-download { 
            display: block; 
            width: 100%; 
            background: var(--vermelho-kibon); 
            color: white; 
            text-align: center; 
            padding: 22px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 20px; 
            margin-top: 25px; 
            box-shadow: 0 10px 20px rgba(227, 27, 35, 0.4); 
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-download:hover { transform: scale(1.02); background: #ff1a21; }
